<!--
  SUBSTITUIR apenas o bloco <aside> no index.html.
  Adicionar o botão .sidebar-toggle e .sidebar-overlay
  FORA do <aside>, logo após ele.
  O restante do index.html permanece igual.
-->

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <span class="brand-icon">✂</span>
      <span class="brand-name">AgendaFácil</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="agendamentos">
        <span class="nav-icon">◷</span>
        <span class="nav-label">Agendamentos</span>
      </a>
      <a href="#" class="nav-item" data-page="clientes">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Clientes</span>
      </a>
      <a href="#" class="nav-item" data-page="servicos">
        <span class="nav-icon">◆</span>
        <span class="nav-label">Serviços</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-sair" onclick="Auth.logout()" title="Encerrar sessão">
        <span class="nav-icon">⎋</span>
        <span class="nav-label">Sair</span>
      </button>
    </div>

  </aside>

  <!-- Aba de toggle (sobressai da borda direita da sidebar) -->
  <button class="sidebar-toggle" id="sidebar-toggle" title="Expandir menu">
    <span class="chevron">›</span>
  </button>

  <!-- Overlay escuro para mobile (fecha sidebar ao clicar fora) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
